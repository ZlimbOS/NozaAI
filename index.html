<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noza AI | Secure</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #020408; --sidebar: #050812; --accent: #00d2ff; --border: rgba(0, 210, 255, 0.12); --card-bg: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; cursor: none !important; user-select: none; }
        body, html { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }
        
        /* КУРСОР */
        #cursor-dot { position: fixed; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 10001; transform: translate(-50%, -50%); }
        #cursor-outline { position: fixed; width: 30px; height: 30px; border: 1px dashed var(--accent); border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s; animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* ЭКРАНЫ */
        #landing { position: fixed; inset: 0; z-index: 1000; background: radial-gradient(circle at center, #0a192f 0%, #020408 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .hero-title { font-size: clamp(40px, 10vw, 80px); font-weight: 800; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .hero-btn { margin-top: 30px; padding: 18px 45px; font-size: 18px; font-weight: 600; background: var(--accent); color: #000; border: none; border-radius: 50px; transition: 0.3s; }
        
        #app { display: none; height: 100vh; opacity: 0; transition: 0.5s; }

        /* САЙДБАР */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .new-chat-btn { border: 1px solid var(--accent); color: var(--accent); background: transparent; padding: 12px; border-radius: 12px; font-weight: 600; margin-bottom: 20px; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px; border-radius: 10px; background: var(--card-bg); font-size: 14px; margin-bottom: 8px; border: 1px solid transparent; }
        .chat-item.active { border-color: var(--accent); background: rgba(0, 210, 255, 0.05); }

        /* ОСНОВНОЕ ОКНО */
        main { flex: 1; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; padding: 40px 10%; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 800px; width: 100%; margin: 0 auto; display: flex; gap: 15px; animation: fadeInUp 0.3s ease; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 1px solid var(--border); flex-shrink: 0; }
        .msg-ai { background: var(--accent); color: #000; }
        .msg-user { background: #2a2d35; }
        .msg-text { line-height: 1.6; color: #d1d9e6; white-space: pre-wrap; padding-top: 5px; }

        /* ВВОД */
        .input-area { padding: 20px 10% 40px; }
        .input-box { max-width: 800px; margin: 0 auto; background: #11141b; border: 1px solid var(--border); border-radius: 15px; padding: 5px 15px; display: flex; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 15px; outline: none; user-select: text !important; }
        .send-btn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="cursor-dot"></div>
<div id="cursor-outline"></div>

<section id="landing">
    <h1 class="hero-title">NOZA AI</h1>
    <button class="hero-btn" onclick="startApp()">Начать</button>
</section>

<div id="app">
    <aside class="sidebar">
        <div style="font-weight: 800; color: var(--accent); margin-bottom: 25px;">NOZA ENGINE</div>
        <button class="new-chat-btn" onclick="createNewChat()">+ Новый чат</button>
        <div class="chat-list" id="chatList"></div>
    </aside>
    <main>
        <div class="chat-container" id="chatWindow"></div>
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Напишите сообщение..." autocomplete="off">
                <button class="send-btn" id="sendBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"/></svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    // Защищенный ключ
    const _KEY = "Z3NrX2drU0h6S2o2Tjhzblo1WEVlWTdXR2R5YnJvRlk4MENlWkx6T0pYNmZJemxuMUJMS0ZNajA=";
    const K = atob(_KEY).slice(0, -1);

    let chats = [];
    let curId = null;

    // Блокировка консоли
    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };

    function startApp() {
        document.getElementById('landing').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('landing').style.display = 'none';
            const app = document.getElementById('app');
            app.style.display = 'flex';
            setTimeout(() => app.style.opacity = '1', 50);
            if(!chats.length) createNewChat();
        }, 500);
    }

    function createNewChat() {
        const id = Date.now();
        chats.unshift({id, title: "Новый чат", msgs: [{role:'assistant', content:'Готов к работе. Какой у вас вопрос?'}]});
        curId = id;
        render();
    }

    async function handleSend() {
        const inp = document.getElementById('userInput');
        const txt = inp.value.trim();
        if(!txt || !curId) return;

        const chat = chats.find(c => c.id === curId);
        if(chat.title === "Новый чат") chat.title = txt.slice(0, 20);
        
        chat.msgs.push({role: 'user', content: txt});
        inp.value = "";
        const aiIdx = chat.msgs.push({role: 'assistant', content: '...'}) - 1;
        render();

        try {
            const res = await fetch("https://groq.com", {
                method: "POST",
                headers: {"Authorization": `Bearer ${K}`, "Content-Type": "application/json"},
                body: JSON.stringify({model: "llama3-8b-8192", messages: chat.msgs.filter(m => m.content !== '...')})
            });
            const data = await res.json();
            chat.msgs[aiIdx].content = data.choices[0].message.content;
        } catch(e) {
            chat.msgs[aiIdx].content = "Ошибка: Для работы API Groq в браузере требуется серверная прослойка или расширение CORS.";
        }
        render();
    }

    function render() {
        const chat = chats.find(c => c.id === curId);
        document.getElementById('chatList').innerHTML = chats.map(c => `<div class="chat-item ${c.id===curId?'active':''}" onclick="curId=${c.id};render();">${c.title}</div>`).join('');
        document.getElementById('chatWindow').innerHTML = chat.msgs.map(m => `<div class="message"><div class="msg-avatar ${m.role==='assistant'?'msg-ai':'msg-user'}">${m.role==='assistant'?'NZ':'U'}</div><div class="msg-text">${m.content}</div></div>`).join('');
        document.getElementById('chatWindow').scrollTop = document.getElementById('chatWindow').scrollHeight;
    }

    document.getElementById('sendBtn').onclick = handleSend;
    document.getElementById('userInput').onkeypress = e => e.key === 'Enter' && handleSend();

    const d=document.getElementById('cursor-dot'), o=document.getElementById('cursor-outline');
    let mx=0, my=0, ox=0, oy=0;
    document.onmousemove = e => { mx=e.clientX; my=e.clientY; d.style.left=mx+'px'; d.style.top=my+'px'; };
    function l() { ox+=(mx-ox)*0.15; oy+=(my-oy)*0.15; o.style.left=ox+'px'; o.style.top=oy+'px'; requestAnimationFrame(l); }
    l();
</script>
</body>
</html>
